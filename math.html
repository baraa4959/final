    <script>
      const STORAGE_KEY = "math-electronic-quiz-attempts-v2";
      const LEGACY_STORAGE_KEY = "math-electronic-quiz-attempts-v1";
      const DRAFT_KEY = "math-electronic-quiz-draft-v1";
      const THEME_KEY = "math-electronic-quiz-theme";

      const els = {
        html: document.documentElement,
        title: document.getElementById("quiz-title"),
        description: document.getElementById("quiz-description"),
        themeMode: document.getElementById("theme-mode"),
        loadError: document.getElementById("load-error"),
        setupView: document.getElementById("setup-view"),
        quizView: document.getElementById("quiz-view"),
        resultView: document.getElementById("result-view"),
        resumeBanner: document.getElementById("resume-banner"),
        resumeBtn: document.getElementById("resume-btn"),
        discardDraftBtn: document.getElementById("discard-draft-btn"),
        duration: document.getElementById("duration-minutes"),
        customTimeField: document.getElementById("custom-time-field"),
        questionCustomPanel: document.getElementById("question-custom-panel"),
        customCountToggle: document.getElementById("custom-count-toggle"),
        questionCount: document.getElementById("question-count"),
        rangeStart: document.getElementById("range-start"),
        rangeEnd: document.getElementById("range-end"),
        questionScopeText: document.getElementById("question-scope-text"),
        shuffleQuestions: document.getElementById("shuffle-questions"),
        shuffleChoices: document.getElementById("shuffle-choices"),
        instantFeedback: document.getElementById("instant-feedback"),
        loadStatus: document.getElementById("load-status"),
        startBtn: document.getElementById("start-btn"),
        clearHistoryBtn: document.getElementById("clear-history-btn"),
        historyList: document.getElementById("history-list"),
        questionPosition: document.getElementById("question-position"),
        questionType: document.getElementById("question-type"),
        answeredCount: document.getElementById("answered-count"),
        quizProgress: document.getElementById("quiz-progress"),
        timer: document.getElementById("timer"),
        questionPanel: document.getElementById("question-panel"),
        passageBox: document.getElementById("passage-box"),
        passageTitle: document.getElementById("passage-title"),
        passageContent: document.getElementById("passage-content"),
        questionPrompt: document.getElementById("question-prompt"),
        answerArea: document.getElementById("answer-area"),
        answerFeedback: document.getElementById("answer-feedback"),
        prevBtn: document.getElementById("prev-btn"),
        nextBtn: document.getElementById("next-btn"),
        submitBtn: document.getElementById("submit-btn"),
        questionDots: document.getElementById("question-dots"),
        resultTitle: document.getElementById("result-title"),
        scoreNumber: document.getElementById("score-number"),
        resultSummary: document.getElementById("result-summary"),
        resultMetrics: document.getElementById("result-metrics"),
        reviewList: document.getElementById("review-list"),
        newAttemptBtn: document.getElementById("new-attempt-btn"),
        exportMistakesBtn: document.getElementById("export-mistakes-btn"),
        printArea: document.getElementById("print-area"),
        imageViewer: document.getElementById("image-viewer"),
        imageViewerClose: document.getElementById("image-viewer-close"),
        imageViewerImg: document.getElementById("image-viewer-img"),
      };

      let quizData = null;
      let passageMap = new Map();
      let quizState = null;
      let selectedTimePreset = "none";
      let useCustomQuestions = false;
      let selectedQuestionPreset = "all";
      let currentAttempt = null;
      let currentReviewFilter = "all";

      function init() {
        migrateAttempts();
        applyTheme(localStorage.getItem(THEME_KEY) || "auto");
        bindEvents();
        renderHistory();
        loadQuestions();
      }

      function bindEvents() {
        els.themeMode.addEventListener("change", () =>
          applyTheme(els.themeMode.value),
        );
        els.startBtn.addEventListener("click", startQuiz);
        els.clearHistoryBtn.addEventListener("click", clearHistory);
        els.resumeBtn.addEventListener("click", resumeDraft);
        els.discardDraftBtn.addEventListener("click", discardDraft);
        els.prevBtn.addEventListener("click", () =>
          goToQuestion(quizState.currentIndex - 1),
        );
        els.nextBtn.addEventListener("click", () =>
          goToQuestion(quizState.currentIndex + 1),
        );
        els.submitBtn.addEventListener("click", confirmSubmitQuiz);
        els.newAttemptBtn.addEventListener("click", resetToSetup);
        els.exportMistakesBtn.addEventListener("click", exportMistakesPdf);
        els.imageViewerClose.addEventListener("click", closeImageViewer);
        els.imageViewer.addEventListener("click", event => {
          if (event.target === els.imageViewer) closeImageViewer();
        });
        document.addEventListener("keydown", event => {
          if (event.key === "Escape" && !els.imageViewer.hidden)
            closeImageViewer();
        });
        els.customCountToggle.addEventListener("click", () =>
          setQuestionMode(!useCustomQuestions),
        );
        [els.rangeStart, els.rangeEnd, els.questionCount].forEach(input => {
          input.addEventListener("input", updateQuestionScope);
        });

        document.querySelectorAll("[data-time-preset]").forEach(button => {
          button.addEventListener("click", () =>
            setTimePreset(button.dataset.timePreset),
          );
        });

        document.querySelectorAll("[data-question-preset]").forEach(button => {
          button.addEventListener("click", () =>
            setQuestionPreset(button.dataset.questionPreset),
          );
        });

        document.querySelectorAll("[data-review-filter]").forEach(button => {
          button.addEventListener("click", () => {
            currentReviewFilter = button.dataset.reviewFilter;
            renderReviewFilters();
            renderReviewList();
          });
        });
      }

      function applyTheme(mode) {
        const theme = ["auto", "light", "dark"].includes(mode) ? mode : "auto";
        els.html.dataset.theme = theme;
        els.themeMode.value = theme;
        localStorage.setItem(THEME_KEY, theme);
      }

      async function loadQuestions() {
        try {
          const response = await fetch("math.json", { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          setQuizData(data);
        } catch (error) {
          els.loadError.hidden = false;
          els.loadError.textContent =
            "تعذر تحميل math.json. شغل الصفحة عبر سيرفر محلي.";
          els.loadStatus.textContent = "تعذر تحميل الأسئلة.";
          els.startBtn.disabled = true;
        }
      }

      function setQuizData(data) {
        quizData = normalizeQuizData(data);
        passageMap = new Map(
          quizData.passages.map(passage => [passage.id, passage]),
        );
        els.title.textContent = quizData.title || "اختبار إلكتروني";
        document.title = quizData.title || "اختبار إلكتروني";
        els.description.textContent = quizData.description || "";
        els.description.hidden = !quizData.description;
        els.loadStatus.textContent = "";
        els.loadStatus.hidden = true;
        els.startBtn.disabled = quizData.questions.length === 0;
        applyDefaults();
        updateDraftBanner();
      }

      function normalizeQuizData(data) {
        const questions = Array.isArray(data.questions) ? data.questions : [];
        const passages = Array.isArray(data.passages) ? data.passages : [];
        return {
          title: data.title || "اختبار إلكتروني",
          description: data.description || "",
          settings: data.settings || {},
          passages: passages.map(passage => ({
            id: String(passage.id),
            title: passage.title || "قطعة قراءة",
            content: passage.content || "",
          })),
          questions: questions.map((question, index) => ({
            ...question,
            id: question.id ? String(question.id) : `q-${index + 1}`,
            type: String(question.type || "essay").trim(),
            _jsonIndex: index + 1,
          })),
        };
      }

      function applyDefaults() {
        const defaults = quizData.settings || {};
        const total = Math.max(quizData.questions.length, 1);
        selectedTimePreset = "none";
        if (
          defaults.durationMinutes &&
          !["5", "10", "15", "30"].includes(String(defaults.durationMinutes))
        ) {
          els.duration.value = clampNumber(defaults.durationMinutes, 1, 999);
        }

        els.rangeStart.max = total;
        els.rangeEnd.max = total;
        els.questionCount.max = total;
        els.rangeStart.value = 1;
        els.rangeEnd.value = total;
        els.questionCount.value = total;
        els.shuffleQuestions.checked = defaults.shuffleQuestions !== false;
        els.shuffleChoices.checked = defaults.shuffleChoices !== false;
        els.instantFeedback.checked = defaults.instantFeedback === true;
        setTimePreset(selectedTimePreset);
        setQuestionMode(false);
        updateQuestionScope();
      }

      function setTimePreset(value) {
        selectedTimePreset = value || "none";
        document.querySelectorAll("[data-time-preset]").forEach(button => {
          button.classList.toggle(
            "active",
            button.dataset.timePreset === selectedTimePreset,
          );
        });
        els.customTimeField.hidden = selectedTimePreset !== "custom";
      }

      function setQuestionMode(enabled) {
        useCustomQuestions = enabled;
        els.questionCustomPanel.hidden = !useCustomQuestions;
        els.customCountToggle.classList.toggle("active", useCustomQuestions);
        updateQuestionScope();
      }

      function setQuestionPreset(value) {
        selectedQuestionPreset = value || "all";
        const rangeSize = currentRangeSize();
        if (selectedQuestionPreset === "all") {
          els.questionCount.value = rangeSize;
        } else {
          els.questionCount.value = Math.min(
            Number(selectedQuestionPreset),
            rangeSize,
          );
        }
        updateQuestionScope();
      }

      function updateQuestionScope() {
        if (!quizData) return;
        const total = Math.max(quizData.questions.length, 1);
        let start = clampNumber(els.rangeStart.value, 1, total);
        let end = clampNumber(els.rangeEnd.value, 1, total);
        if (end < start) end = start;
        els.rangeStart.value = start;
        els.rangeEnd.value = end;
        els.rangeStart.max = total;
        els.rangeEnd.max = total;

        const rangeSize = end - start + 1;
        els.questionCount.max = rangeSize;
        els.questionCount.value = clampNumber(
          els.questionCount.value,
          1,
          rangeSize,
        );
        if (Number(els.questionCount.value) === rangeSize)
          selectedQuestionPreset = "all";

        document.querySelectorAll("[data-question-preset]").forEach(button => {
          button.classList.toggle(
            "active",
            button.dataset.questionPreset === selectedQuestionPreset,
          );
        });

        const selected = useCustomQuestions
          ? Number(els.questionCount.value)
          : quizData.questions.length;
        els.questionScopeText.textContent = `النطاق حسب ترتيب math.json: من ${start} إلى ${end}. المختار: ${selected} سؤال.`;
      }

      function currentRangeSize() {
        const start = Number(els.rangeStart.value) || 1;
        const end = Number(els.rangeEnd.value) || start;
        return Math.max(1, end - start + 1);
      }

      function readSettings() {
        const total = quizData.questions.length;
        const timed = selectedTimePreset !== "none";
        const durationMinutes =
          selectedTimePreset === "custom"
            ? clampNumber(els.duration.value, 1, 999)
            : timed
              ? Number(selectedTimePreset)
              : 0;

        const start = useCustomQuestions
          ? clampNumber(els.rangeStart.value, 1, total)
          : 1;
        const end = useCustomQuestions
          ? clampNumber(els.rangeEnd.value, start, total)
          : total;
        const rangeSize = end - start + 1;
        const questionCount = useCustomQuestions
          ? clampNumber(els.questionCount.value, 1, rangeSize)
          : total;

        return {
          timed,
          durationMinutes,
          questionCount,
          rangeStart: start,
          rangeEnd: end,
          customQuestions: useCustomQuestions,
          shuffleQuestions: els.shuffleQuestions.checked,
          shuffleChoices: els.shuffleChoices.checked,
          instantFeedback: els.instantFeedback.checked,
        };
      }

      function startQuiz() {
        if (!quizData || quizData.questions.length === 0) return;
        clearTimer();
        const settings = readSettings();
        const rangeQuestions = quizData.questions.slice(
          settings.rangeStart - 1,
          settings.rangeEnd,
        );
        const sourceQuestions = settings.shuffleQuestions
          ? shuffle(rangeQuestions)
          : [...rangeQuestions];
        const selected = sourceQuestions.slice(0, settings.questionCount);
        const preparedQuestions = selected.map((question, index) =>
          prepareQuestion(question, index, settings),
        );
        const now = new Date();

        quizState = {
          settings,
          questions: preparedQuestions,
          answers: Object.fromEntries(
            preparedQuestions.map(question => [
              question._key,
              defaultAnswer(question),
            ]),
          ),
          locked: {},
          currentIndex: 0,
          startedAt: now,
          endsAt: settings.timed
            ? now.getTime() + settings.durationMinutes * 60 * 1000
            : null,
          timerId: null,
          finished: false,
        };

        saveDraft();
        showView("quiz");
        renderQuestion();
        startClock();
      }

      function prepareQuestion(question, index, settings) {
        const prepared = deepClone(question);
        prepared._key = `${prepared.id}-${index}`;
        prepared._points = Number.isFinite(Number(prepared.points))
          ? Number(prepared.points)
          : 1;

        if (prepared.type === "true_false") {
          const booleanChoices = [
            { id: "true", text: "صواب" },
            { id: "false", text: "خطأ" },
          ];
          prepared._choices = settings.shuffleChoices
            ? shuffle(booleanChoices)
            : booleanChoices;
        } else if (Array.isArray(prepared.choices)) {
          const choices = prepared.choices.map(choice => ({
            ...choice,
            id: String(choice.id),
          }));
          prepared._choices = settings.shuffleChoices
            ? shuffle(choices)
            : choices;
        }

        if (prepared.type === "matching" && Array.isArray(prepared.pairs)) {
          const rightOptions = prepared.pairs.map(pair => ({
            id: String(pair.rightId),
            text: pair.right,
          }));
          prepared._rightOptions = settings.shuffleChoices
            ? shuffle(rightOptions)
            : rightOptions;
        }

        if (prepared.type === "ordering" && Array.isArray(prepared.items)) {
          prepared._presentedItems = settings.shuffleChoices
            ? shuffle(prepared.items)
            : [...prepared.items];
        }

        return prepared;
      }

      function defaultAnswer(question) {
        if (question.type === "multiple") return [];
        if (question.type === "fill_blank") {
          return Object.fromEntries(
            (question.blanks || []).map(blank => [String(blank.id), ""]),
          );
        }
        if (question.type === "matching") {
          return Object.fromEntries(
            (question.pairs || []).map(pair => [String(pair.leftId), ""]),
          );
        }
        if (question.type === "ordering") {
          return (question._presentedItems || question.items || []).map(item =>
            String(item.id),
          );
        }
        return "";
      }

      function renderQuestion() {
        const question = quizState.questions[quizState.currentIndex];
        const total = quizState.questions.length;
        els.questionPosition.textContent = `السؤال ${quizState.currentIndex + 1} من ${total}`;
        els.questionType.textContent = typeLabel(question.type);
        els.quizProgress.max = total;
        els.quizProgress.value = quizState.currentIndex + 1;
        els.prevBtn.disabled = quizState.currentIndex === 0;
        els.nextBtn.disabled = quizState.currentIndex === total - 1;

        renderPassage(question);
        renderQuestionPrompt(question);
        els.answerArea.replaceChildren(renderAnswerControl(question));
        appendFinalizeButton(question);
        renderAnswerFeedback(question);
        renderQuestionDots();
        updateAnsweredCount();
        saveDraft();
        typesetMath(els.questionPanel);
      }

      function renderPassage(question) {
        const passage = question.passageId
          ? passageMap.get(String(question.passageId))
          : null;
        els.passageBox.hidden = !passage;
        if (!passage) return;
        setAutoText(els.passageTitle, passage.title);
        setAutoText(els.passageContent, passage.content);
      }

      function renderQuestionPrompt(question) {
        const text = question.prompt || question.question || "";
        const imagePath = questionImagePath(question);
        if (!imagePath) {
          setAutoText(els.questionPrompt, text);
          return;
        }

        els.questionPrompt.dir = "auto";
        els.questionPrompt.replaceChildren(
          createPromptContent(text, imagePath),
        );
      }

      function createPromptContent(
        text,
        imagePath,
        textTag = "div",
        textClass = "question-text",
      ) {
        const content = document.createElement("div");
        content.className = "question-content";
        const textNode = document.createElement(textTag);
        textNode.className = textClass;
        setAutoText(textNode, text);
        content.append(textNode);
        if (imagePath) content.append(createQuestionImageButton(imagePath));
        return content;
      }

      function createQuestionImageButton(path) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "question-image-button";
        button.setAttribute("aria-label", "تكبير صورة السؤال");
        button.title = "تكبير صورة السؤال";
        button.append(createQuestionImage(path, "question-image-thumb"));
        button.addEventListener("click", () =>
          openImageViewer(path, "صورة السؤال"),
        );
        return button;
      }

      function createQuestionImage(path, className) {
        const image = document.createElement("img");
        image.className = className;
        image.src = path;
        image.alt = "صورة السؤال";
        image.loading = "lazy";
        return image;
      }

      function questionImagePath(question) {
        const path = question?.path || question?.image || question?.imagePath;
        return typeof path === "string" ? path.trim() : "";
      }

      function openImageViewer(path, alt) {
        els.imageViewerImg.src = path;
        els.imageViewerImg.alt = alt || "صورة السؤال";
        els.imageViewer.hidden = false;
        els.imageViewerClose.focus();
      }

      function closeImageViewer() {
        els.imageViewer.hidden = true;
        els.imageViewerImg.removeAttribute("src");
        els.imageViewerImg.alt = "";
      }

      function renderAnswerControl(question) {
        const answer = quizState.answers[question._key];
        if (question.type === "single" || question.type === "true_false")
          return renderSingleChoice(question, answer);
        if (question.type === "multiple")
          return renderMultipleChoice(question, answer);
        if (question.type === "short_answer")
          return renderTextAnswer(question, answer, false);
        if (question.type === "numeric")
          return renderNumericAnswer(question, answer);
        if (question.type === "fill_blank")
          return renderFillBlank(question, answer);
        if (question.type === "matching")
          return renderMatching(question, answer);
        if (question.type === "ordering")
          return renderOrdering(question, answer);
        return renderTextAnswer(question, answer, true);
      }

      function renderSingleChoice(question, answer) {
        const wrap = document.createElement("div");
        wrap.className = "answer-area";
        const locked = isLocked(question);
        (question._choices || []).forEach(choice => {
          const label = document.createElement("label");
          label.className = locked ? "option locked" : "option";
          const input = document.createElement("input");
          input.type = "radio";
          input.name = `answer-${question._key}`;
          input.value = String(choice.id);
          input.checked = String(answer) === String(choice.id);
          input.disabled = locked;
          input.addEventListener("change", () => {
            setAnswer(question, input.value);
            if (quizState.settings.instantFeedback) lockAnswer(question);
          });
          const text = document.createElement("span");
          text.className = "answer-text";
          setAutoText(text, choice.text);
          label.append(input, text);
          wrap.append(label);
        });
        return wrap;
      }

      function renderMultipleChoice(question, answer) {
        const selected = new Set(asArray(answer).map(String));
        const locked = isLocked(question);
        const wrap = document.createElement("div");
        wrap.className = "answer-area";
        (question._choices || []).forEach(choice => {
          const label = document.createElement("label");
          label.className = locked ? "option locked" : "option";
          const input = document.createElement("input");
          input.type = "checkbox";
          input.value = String(choice.id);
          input.checked = selected.has(String(choice.id));
          input.disabled = locked;
          input.addEventListener("change", () => {
            const next = new Set(
              asArray(quizState.answers[question._key]).map(String),
            );
            input.checked ? next.add(input.value) : next.delete(input.value);
            setAnswer(question, [...next]);
          });
          const text = document.createElement("span");
          text.className = "answer-text";
          setAutoText(text, choice.text);
          label.append(input, text);
          wrap.append(label);
        });
        return wrap;
      }

      function renderTextAnswer(question, answer, multiline) {
        const input = document.createElement(multiline ? "textarea" : "input");
        input.className = multiline ? "textarea" : "input";
        if (!multiline) input.type = "text";
        input.value = answer || "";
        input.dir = "auto";
        input.disabled = isLocked(question);
        input.addEventListener("input", () =>
          setAnswer(question, input.value, false),
        );
        return input;
      }

      function renderNumericAnswer(question, answer) {
        const input = document.createElement("input");
        input.className = "input";
        input.type = "text";
        input.inputMode = "decimal";
        input.value = answer || "";
        input.dir = "ltr";
        input.disabled = isLocked(question);
        input.addEventListener("input", () =>
          setAnswer(question, input.value, false),
        );
        return input;
      }

      function renderFillBlank(question, answer) {
        const wrap = document.createElement("div");
        wrap.className = "answer-area";
        const locked = isLocked(question);
        (question.blanks || []).forEach((blank, index) => {
          const row = document.createElement("div");
          row.className = "blank-row";
          const label = document.createElement("label");
          label.textContent = blank.label || `الفراغ ${index + 1}`;
          label.setAttribute("for", `${question._key}-${blank.id}`);
          const input = document.createElement("input");
          input.id = `${question._key}-${blank.id}`;
          input.className = "input";
          input.type = "text";
          input.value = answer?.[blank.id] || "";
          input.disabled = locked;
          input.addEventListener("input", () => {
            const next = { ...(quizState.answers[question._key] || {}) };
            next[String(blank.id)] = input.value;
            setAnswer(question, next, false);
          });
          row.append(label, input);
          wrap.append(row);
        });
        return wrap;
      }

      function renderMatching(question, answer) {
        const wrap = document.createElement("div");
        wrap.className = "answer-area";
        const locked = isLocked(question);
        (question.pairs || []).forEach(pair => {
          const row = document.createElement("div");
          row.className = "matching-row";
          const left = document.createElement("div");
          left.className = "answer-text";
          setAutoText(left, pair.left);
          const select = document.createElement("select");
          select.className = "select";
          select.disabled = locked;
          select.append(new Option("اختر", ""));
          (question._rightOptions || []).forEach(option => {
            select.append(new Option(option.text, String(option.id)));
          });
          select.value = answer?.[pair.leftId] || "";
          select.addEventListener("change", () => {
            const next = { ...(quizState.answers[question._key] || {}) };
            next[String(pair.leftId)] = select.value;
            setAnswer(question, next);
          });
          row.append(left, select);
          wrap.append(row);
        });
        return wrap;
      }

      function renderOrdering(question, answer) {
        const wrap = document.createElement("div");
        wrap.className = "answer-area";
        const locked = isLocked(question);
        const order = asArray(answer).map(String);
        const itemsById = new Map(
          (question.items || []).map(item => [String(item.id), item]),
        );
        order.forEach((id, index) => {
          const item = itemsById.get(id);
          if (!item) return;
          const row = document.createElement("div");
          row.className = "order-row";
          const number = document.createElement("span");
          number.className = "order-index";
          number.textContent = index + 1;
          const text = document.createElement("div");
          text.className = "answer-text";
          setAutoText(text, item.text);
          const actions = document.createElement("div");
          actions.className = "order-actions";
          const up = document.createElement("button");
          up.className = "icon-button";
          up.type = "button";
          up.textContent = "↑";
          up.ariaLabel = "رفع";
          up.disabled = locked || index === 0;
          up.addEventListener("click", () =>
            moveOrderItem(question, index, -1),
          );
          const down = document.createElement("button");
          down.className = "icon-button";
          down.type = "button";
          down.textContent = "↓";
          down.ariaLabel = "خفض";
          down.disabled = locked || index === order.length - 1;
          down.addEventListener("click", () =>
            moveOrderItem(question, index, 1),
          );
          actions.append(up, down);
          row.append(number, text, actions);
          wrap.append(row);
        });
        return wrap;
      }

      function appendFinalizeButton(question) {
        if (!quizState.settings.instantFeedback || isLocked(question)) return;
        if (question.type === "single" || question.type === "true_false")
          return;
        const button = document.createElement("button");
        button.id = "finalize-answer-btn";
        button.className = "button primary";
        button.type = "button";
        button.textContent = "اعتماد الإجابة";
        button.disabled = !hasAnswer(
          question,
          quizState.answers[question._key],
        );
        button.addEventListener("click", () => lockAnswer(question));
        els.answerArea.append(button);
      }

      function updateFinalizeButton(question) {
        const button = document.getElementById("finalize-answer-btn");
        if (!button) return;
        button.disabled = !hasAnswer(
          question,
          quizState.answers[question._key],
        );
      }

      function renderAnswerFeedback(question) {
        if (!quizState.settings.instantFeedback || !isLocked(question)) {
          els.answerFeedback.hidden = true;
          els.answerFeedback.textContent = "";
          els.answerFeedback.className = "answer-feedback";
          return;
        }

        const grade = gradeQuestion(question, quizState.answers[question._key]);
        els.answerFeedback.hidden = false;
        els.answerFeedback.className = `answer-feedback ${grade.status}`;
        const base = statusLabel(grade.status);
        const correct = formatCorrectAnswer(question);
        els.answerFeedback.textContent =
          grade.status === "correct"
            ? `${base}.`
            : `${base}. الإجابة الصحيحة: ${correct}`;
      }

      function moveOrderItem(question, index, direction) {
        if (isLocked(question)) return;
        const order = [...asArray(quizState.answers[question._key])];
        const target = index + direction;
        if (target < 0 || target >= order.length) return;
        [order[index], order[target]] = [order[target], order[index]];
        setAnswer(question, order);
        renderQuestion();
      }

      function setAnswer(question, value, refreshDots = true) {
        if (isLocked(question)) return;
        quizState.answers[question._key] = value;
        if (refreshDots) renderQuestionDots();
        updateAnsweredCount();
        updateFinalizeButton(question);
        saveDraft();
      }

      function lockAnswer(question) {
        if (!hasAnswer(question, quizState.answers[question._key])) return;
        quizState.locked[question._key] = true;
        saveDraft();
        renderQuestion();
      }

      function isLocked(question) {
        return Boolean(quizState?.locked?.[question._key]);
      }

      function renderQuestionDots() {
        const buttons = quizState.questions.map((question, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "dot";
          if (index === quizState.currentIndex) button.classList.add("current");
          if (hasAnswer(question, quizState.answers[question._key]))
            button.classList.add("answered");
          if (isLocked(question)) button.classList.add("locked");
          button.textContent = index + 1;
          button.addEventListener("click", () => goToQuestion(index));
          return button;
        });
        els.questionDots.replaceChildren(...buttons);
      }

      function updateAnsweredCount() {
        if (!quizState) return;
        const answered = quizState.questions.filter(question =>
          hasAnswer(question, quizState.answers[question._key]),
        ).length;
        els.answeredCount.textContent = `${answered} مجاب`;
      }

      function hasAnswer(question, answer) {
        if (question.type === "multiple") return asArray(answer).length > 0;
        if (question.type === "ordering") return asArray(answer).length > 0;
        if (question.type === "fill_blank" || question.type === "matching") {
          return Object.values(answer || {}).some(
            value => String(value || "").trim() !== "",
          );
        }
        return String(answer || "").trim() !== "";
      }

      function goToQuestion(index) {
        if (!quizState || index < 0 || index >= quizState.questions.length)
          return;
        quizState.currentIndex = index;
        renderQuestion();
      }

      function startClock() {
        clearTimer();
        updateTimer();
        quizState.timerId = window.setInterval(updateTimer, 250);
      }

      function updateTimer() {
        if (!quizState || quizState.finished) return;
        const elapsed = Math.max(
          0,
          Math.round(
            (Date.now() - new Date(quizState.startedAt).getTime()) / 1000,
          ),
        );
        if (!quizState.settings.timed) {
          els.timer.textContent = formatDuration(elapsed);
          els.timer.classList.remove("low");
          return;
        }

        const remaining = Math.max(
          0,
          Math.ceil((quizState.endsAt - Date.now()) / 1000),
        );
        els.timer.textContent = formatDuration(remaining);
        els.timer.classList.toggle("low", remaining <= 60);
        if (remaining <= 0) finishQuiz("timeout");
      }

      function clearTimer() {
        if (quizState?.timerId) window.clearInterval(quizState.timerId);
      }

      function confirmSubmitQuiz() {
        if (!quizState || quizState.finished) return;
        const incompleteCount = countIncompleteQuestions();
        const message =
          incompleteCount > 0
            ? `باقي ${incompleteCount} من الأسئلة غير مكتمل. إن قمت بتسليم الاختبار لن تستطيع تعديل الحل.`
            : "إن قمت بتسليم الاختبار لن تستطيع تعديل الحل. هل تريد المتابعة؟";
        if (!window.confirm(message)) return;
        finishQuiz("submitted");
      }

      function countIncompleteQuestions() {
        if (!quizState) return 0;
        return quizState.questions.filter(
          question => !hasAnswer(question, quizState.answers[question._key]),
        ).length;
      }

      function finishQuiz(reason) {
        if (!quizState || quizState.finished) return;
        quizState.finished = true;
        clearTimer();
        const attempt = buildAttempt(reason);
        saveAttempt(attempt);
        clearDraft();
        renderResults(attempt, false);
        renderHistory();
        showView("result");
      }

      function buildAttempt(reason) {
        const reviews = quizState.questions.map((question, index) => {
          const answer = quizState.answers[question._key];
          const grade = gradeQuestion(question, answer);
          const passage = question.passageId
            ? passageMap.get(String(question.passageId))
            : null;
          return {
            id: question.id,
            number: index + 1,
            jsonIndex: question._jsonIndex || index + 1,
            type: question.type,
            typeLabel: typeLabel(question.type),
            prompt: question.prompt || question.question || "",
            path: questionImagePath(question),
            passageTitle: passage?.title || "",
            status: grade.status,
            earned: roundScore(grade.earned),
            max: roundScore(grade.max),
            userAnswer: formatAnswer(question, answer, true),
            correctAnswer: formatCorrectAnswer(question),
            options: buildReviewOptions(question, answer),
          };
        });

        const earned = roundScore(
          reviews.reduce((sum, item) => sum + item.earned, 0),
        );
        const max = roundScore(
          reviews.reduce((sum, item) => sum + item.max, 0),
        );
        const counts = {
          correct: reviews.filter(item => item.status === "correct").length,
          partial: reviews.filter(item => item.status === "partial").length,
          incorrect: reviews.filter(item => item.status === "incorrect").length,
          unanswered: reviews.filter(item => item.status === "unanswered")
            .length,
          ungraded: reviews.filter(item => item.status === "ungraded").length,
          total: reviews.length,
        };

        return {
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          title: quizData.title,
          date: new Date().toISOString(),
          reason,
          settings: quizState.settings,
          durationUsed: Math.max(
            0,
            Math.round(
              (Date.now() - new Date(quizState.startedAt).getTime()) / 1000,
            ),
          ),
          earned,
          max,
          percent: max > 0 ? Math.round((earned / max) * 100) : 0,
          counts,
          reviews,
        };
      }

      function gradeQuestion(question, answer) {
        const points = Math.max(0, Number(question._points || 1));
        if (!hasAnswer(question, answer))
          return { status: "unanswered", earned: 0, max: points };

        if (question.type === "single") {
          return exactGrade(String(answer), String(question.answer), points);
        }
        if (question.type === "true_false") {
          return exactGrade(
            String(answer),
            String(Boolean(question.answer)),
            points,
          );
        }
        if (question.type === "multiple") {
          const selected = new Set(asArray(answer).map(String));
          const correct = new Set(asArray(question.answer).map(String));
          const hits = [...selected].filter(id => correct.has(id)).length;
          const wrong = [...selected].filter(id => !correct.has(id)).length;
          if (selected.size === correct.size && hits === correct.size)
            return { status: "correct", earned: points, max: points };
          const ratio = correct.size
            ? Math.max(0, (hits - wrong) / correct.size)
            : 0;
          return {
            status: ratio > 0 ? "partial" : "incorrect",
            earned: points * ratio,
            max: points,
          };
        }
        if (question.type === "short_answer") {
          const accepted = asArray(question.acceptedAnswers || question.answer);
          const actual = normalizeText(answer);
          const isCorrect = accepted.some(
            item => normalizeText(item) === actual,
          );
          return {
            status: isCorrect ? "correct" : "incorrect",
            earned: isCorrect ? points : 0,
            max: points,
          };
        }
        if (question.type === "numeric") {
          const actual = parseNumber(answer);
          const expected = Number(question.answer);
          const tolerance = Number(question.tolerance ?? 0);
          const isCorrect =
            Number.isFinite(actual) && Math.abs(actual - expected) <= tolerance;
          return {
            status: isCorrect ? "correct" : "incorrect",
            earned: isCorrect ? points : 0,
            max: points,
          };
        }
        if (question.type === "fill_blank") {
          const blanks = question.blanks || [];
          const correctCount = blanks.filter(blank => {
            const accepted = asArray(blank.acceptedAnswers || blank.answer);
            const actual = normalizeText(answer?.[blank.id]);
            return accepted.some(item => normalizeText(item) === actual);
          }).length;
          return partialGrade(correctCount, blanks.length, points);
        }
        if (question.type === "matching") {
          const pairs = question.pairs || [];
          const correctCount = pairs.filter(
            pair =>
              String(answer?.[pair.leftId] || "") === String(pair.rightId),
          ).length;
          return partialGrade(correctCount, pairs.length, points);
        }
        if (question.type === "ordering") {
          const actual = asArray(answer).map(String);
          const expected = asArray(
            question.correctOrder || question.answer,
          ).map(String);
          const correctCount = expected.filter(
            (id, index) => actual[index] === id,
          ).length;
          return partialGrade(correctCount, expected.length, points);
        }
        return { status: "ungraded", earned: 0, max: 0 };
      }

      function exactGrade(actual, expected, points) {
        const correct = actual === expected;
        return {
          status: correct ? "correct" : "incorrect",
          earned: correct ? points : 0,
          max: points,
        };
      }

      function partialGrade(correctCount, totalCount, points) {
        if (!totalCount) return { status: "ungraded", earned: 0, max: 0 };
        if (correctCount === totalCount)
          return { status: "correct", earned: points, max: points };
        if (correctCount > 0)
          return {
            status: "partial",
            earned: points * (correctCount / totalCount),
            max: points,
          };
        return { status: "incorrect", earned: 0, max: points };
      }

      function renderResults(attempt, fromHistory) {
        currentAttempt = normalizeAttempt(attempt);
        currentReviewFilter = "all";
        els.resultTitle.textContent = fromHistory
          ? "محاولة محفوظة"
          : currentAttempt.reason === "timeout"
            ? "انتهى الوقت"
            : "النتيجة";
        els.scoreNumber.textContent = `${currentAttempt.percent}%`;
        els.resultSummary.textContent = `${currentAttempt.earned} من ${currentAttempt.max} درجة • الوقت ${formatDuration(currentAttempt.durationUsed)} • ${formatDate(currentAttempt.date)}`;

        const metrics = [
          ["صحيح", currentAttempt.counts.correct],
          [
            "خطأ",
            currentAttempt.counts.incorrect + currentAttempt.counts.partial,
          ],
          ["غير مجاب", currentAttempt.counts.unanswered],
          ["الوقت", formatDuration(currentAttempt.durationUsed)],
        ];
        els.resultMetrics.replaceChildren(
          ...metrics.map(([label, value]) => metricNode(label, value)),
        );
        renderReviewFilters();
        renderReviewList();
        typesetMath(els.resultView);
      }

      function normalizeAttempt(attempt) {
        const counts = {
          correct: 0,
          partial: 0,
          incorrect: 0,
          unanswered: 0,
          ungraded: 0,
          total: attempt.reviews?.length || attempt.counts?.total || 0,
          ...(attempt.counts || {}),
        };
        return {
          ...attempt,
          counts,
          reviews: Array.isArray(attempt.reviews) ? attempt.reviews : [],
        };
      }

      function renderReviewFilters() {
        document.querySelectorAll("[data-review-filter]").forEach(button => {
          button.classList.toggle(
            "active",
            button.dataset.reviewFilter === currentReviewFilter,
          );
        });
      }

      function renderReviewList() {
        if (!currentAttempt) return;
        const items = currentAttempt.reviews.filter(reviewMatchesFilter);
        if (items.length === 0) {
          const empty = document.createElement("p");
          empty.className = "empty";
          empty.textContent = "لا توجد أسئلة في هذا الفلتر.";
          els.reviewList.replaceChildren(empty);
          return;
        }

        els.reviewList.replaceChildren(
          ...items.map(item => {
            const article = document.createElement("article");
            article.className = "review-item";
            const status = document.createElement("span");
            status.className = `badge ${item.status}`;
            status.textContent = statusLabel(item.status);
            const type = document.createElement("span");
            type.className = "badge";
            type.textContent = item.typeLabel || typeLabel(item.type);
            const number = document.createElement("span");
            number.className = "badge";
            number.textContent = `سؤال ${item.number || item.jsonIndex || ""}`;
            const title = createPromptContent(
              item.passageTitle
                ? `${item.passageTitle}\n${item.prompt}`
                : item.prompt,
              questionImagePath(item),
              "h3",
              "review-text question-text",
            );
            article.append(status, type, number, title);

            const hasOptionReview =
              Array.isArray(item.options) && item.options.length > 0;
            if (hasOptionReview) {
              article.append(renderChoiceReview(item.options));
            }

            if (!hasOptionReview) {
              const boxes = document.createElement("div");
              boxes.className = "review-grid";
              boxes.append(reviewBox("إجابتك", item.userAnswer || "غير مجاب"));
              if (item.status !== "correct")
                boxes.append(reviewBox("الإجابة الصحيحة", item.correctAnswer));
              article.append(boxes);
            }
            return article;
          }),
        );
        typesetMath(els.reviewList);
      }

      function reviewMatchesFilter(item) {
        if (currentReviewFilter === "all") return true;
        if (currentReviewFilter === "correct") return item.status === "correct";
        if (currentReviewFilter === "unanswered")
          return item.status === "unanswered";
        if (currentReviewFilter === "incorrect")
          return ["incorrect", "partial"].includes(item.status);
        return true;
      }

      function renderChoiceReview(options) {
        const wrap = document.createElement("div");
        wrap.className = "choice-review";
        options.forEach(option => {
          const row = document.createElement("div");
          row.className = "choice-review-item";
          if (option.selected) row.classList.add("selected");
          if (option.correct) row.classList.add("correct");
          if (option.selected && !option.correct)
            row.classList.add("wrong-selected");
          const text = document.createElement("div");
          text.className = "answer-text";
          setAutoText(text, option.text);
          const mark = document.createElement("span");
          mark.className = "choice-mark";
          mark.textContent =
            option.selected && option.correct
              ? "اختيارك صحيح"
              : option.selected
                ? "اختيارك"
                : option.correct
                  ? "الإجابة الصحيحة"
                  : "";
          row.append(text, mark);
          wrap.append(row);
        });
        return wrap;
      }

      function reviewBox(label, text) {
        const box = document.createElement("div");
        box.className = "review-box";
        const labelNode = document.createElement("span");
        labelNode.className = "review-label";
        labelNode.textContent = label;
        const textNode = document.createElement("div");
        textNode.className = "review-text";
        setAutoText(textNode, text || "—");
        box.append(labelNode, textNode);
        return box;
      }

      function renderHistory() {
        const attempts = loadAttempts();
        if (attempts.length === 0) {
          const empty = document.createElement("p");
          empty.className = "empty";
          empty.textContent = "لا يوجد سجل بعد.";
          els.historyList.replaceChildren(empty);
          return;
        }

        els.historyList.replaceChildren(
          ...attempts.map(attempt => {
            const safeAttempt = normalizeAttempt(attempt);
            const item = document.createElement("article");
            item.className = "history-item";
            const body = document.createElement("div");
            const title = document.createElement("div");
            title.className = "history-title";
            title.textContent = `${safeAttempt.percent}% • ${safeAttempt.earned}/${safeAttempt.max} درجة`;
            const meta = document.createElement("div");
            meta.className = "history-meta";
            meta.textContent = `${formatDate(safeAttempt.date)} • ${safeAttempt.counts.total} أسئلة • ${formatDuration(safeAttempt.durationUsed)}`;
            body.append(title, meta);
            const actions = document.createElement("div");
            actions.className = "history-actions";
            const view = document.createElement("button");
            view.type = "button";
            view.className = "button small";
            view.textContent = "عرض";
            view.addEventListener("click", () => {
              renderResults(safeAttempt, true);
              showView("result");
            });
            const remove = document.createElement("button");
            remove.type = "button";
            remove.className = "button danger small";
            remove.textContent = "حذف";
            remove.addEventListener("click", () =>
              deleteAttempt(safeAttempt.id),
            );
            actions.append(view, remove);
            item.append(body, actions);
            return item;
          }),
        );
      }

      function saveAttempt(attempt) {
        const attempts = loadAttempts();
        attempts.unshift(attempt);
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify(attempts.slice(0, 30)),
        );
      }

      function loadAttempts() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        } catch (error) {
          return [];
        }
      }

      function migrateAttempts() {
        if (localStorage.getItem(STORAGE_KEY)) return;
        const legacy = localStorage.getItem(LEGACY_STORAGE_KEY);
        if (legacy) localStorage.setItem(STORAGE_KEY, legacy);
      }

      function deleteAttempt(id) {
        const attempts = loadAttempts().filter(attempt => attempt.id !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(attempts));
        renderHistory();
      }

      function clearHistory() {
        if (!confirm("مسح كل سجل المحاولات؟")) return;
        localStorage.removeItem(STORAGE_KEY);
        renderHistory();
      }

      function saveDraft() {
        if (!quizState || quizState.finished) return;
        const draft = {
          ...quizState,
          timerId: null,
          startedAt: new Date(quizState.startedAt).toISOString(),
        };
        localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
        updateDraftBanner();
      }

      function loadDraft() {
        try {
          const draft = JSON.parse(localStorage.getItem(DRAFT_KEY) || "null");
          if (!draft || draft.finished || !Array.isArray(draft.questions))
            return null;
          return draft;
        } catch (error) {
          return null;
        }
      }

      function updateDraftBanner() {
        const draft = loadDraft();
        els.resumeBanner.hidden = !draft || !quizData;
      }

      function resumeDraft() {
        const draft = loadDraft();
        if (!draft) {
          updateDraftBanner();
          return;
        }
        quizState = {
          ...draft,
          startedAt: new Date(draft.startedAt),
          timerId: null,
          finished: false,
          locked: draft.locked || {},
        };
        showView("quiz");
        renderQuestion();
        startClock();
      }

      function discardDraft() {
        clearDraft();
        updateDraftBanner();
      }

      function clearDraft() {
        localStorage.removeItem(DRAFT_KEY);
        els.resumeBanner.hidden = true;
      }

      function resetToSetup() {
        clearTimer();
        quizState = null;
        showView("setup");
        renderHistory();
        updateDraftBanner();
      }

      async function exportMistakesPdf() {
        if (!currentAttempt) return;
        const mistakes = currentAttempt.reviews.filter(item =>
          ["incorrect", "partial", "unanswered"].includes(item.status),
        );
        const items = mistakes.length
          ? mistakes
          : currentAttempt.reviews.filter(item => item.status !== "correct");
        els.printArea.replaceChildren(buildPrintContent(items));
        await typesetMath(els.printArea);
        window.print();
      }

      function buildPrintContent(items) {
        const wrapper = document.createElement("section");
        const title = document.createElement("h1");
        title.textContent = "أخطاء الاختبار";
        wrapper.append(title);

        if (items.length === 0) {
          const empty = document.createElement("p");
          empty.textContent = "لا توجد أخطاء في هذه المحاولة.";
          wrapper.append(empty);
          return wrapper;
        }

        items.forEach(item => {
          const article = document.createElement("article");
          const heading = document.createElement("h2");
          heading.textContent = `سؤال ${item.number || ""}: ${statusLabel(item.status)}`;
          const prompt = document.createElement("p");
          setAutoText(
            prompt,
            item.passageTitle
              ? `${item.passageTitle}\n${item.prompt}`
              : item.prompt,
          );
          article.append(heading, prompt);
          const imagePath = questionImagePath(item);
          if (imagePath) {
            article.append(
              createQuestionImage(imagePath, "print-question-image"),
            );
          }

          if (Array.isArray(item.options) && item.options.length > 0) {
            article.append(renderChoiceReview(item.options));
          } else {
            const user = document.createElement("p");
            setAutoText(user, `إجابتك: ${item.userAnswer || "غير مجاب"}`);
            const correct = document.createElement("p");
            setAutoText(
              correct,
              `الإجابة الصحيحة: ${item.correctAnswer || "—"}`,
            );
            article.append(user, correct);
          }
          wrapper.append(article);
        });
        return wrapper;
      }

      function buildReviewOptions(question, answer) {
        if (!["single", "multiple", "true_false"].includes(question.type))
          return [];
        const selected = new Set(asArray(answer).map(String));
        const correct =
          question.type === "true_false"
            ? new Set([String(Boolean(question.answer))])
            : new Set(asArray(question.answer).map(String));
        return (question._choices || question.choices || []).map(choice => ({
          text: choice.text,
          selected: selected.has(String(choice.id)),
          correct: correct.has(String(choice.id)),
        }));
      }

      function formatAnswer(question, answer, emptyAsUnanswered = false) {
        if (!hasAnswer(question, answer))
          return emptyAsUnanswered ? "غير مجاب" : "";
        if (question.type === "single") return choiceText(question, answer);
        if (question.type === "true_false")
          return String(answer) === "true"
            ? "صواب"
            : String(answer) === "false"
              ? "خطأ"
              : "";
        if (question.type === "multiple")
          return asArray(answer)
            .map(id => choiceText(question, id))
            .join("، ");
        if (question.type === "fill_blank") {
          return (question.blanks || [])
            .map(
              blank =>
                `${blank.label || blank.id}: ${answer?.[blank.id] || ""}`,
            )
            .join("\n");
        }
        if (question.type === "matching") {
          const rightMap = new Map(
            (question.pairs || []).map(pair => [
              String(pair.rightId),
              pair.right,
            ]),
          );
          return (question.pairs || [])
            .map(
              pair =>
                `${pair.left}: ${rightMap.get(String(answer?.[pair.leftId])) || ""}`,
            )
            .join("\n");
        }
        if (question.type === "ordering") {
          const itemMap = new Map(
            (question.items || []).map(item => [String(item.id), item.text]),
          );
          return asArray(answer)
            .map(
              (id, index) => `${index + 1}. ${itemMap.get(String(id)) || id}`,
            )
            .join("\n");
        }
        return String(answer || "");
      }

      function formatCorrectAnswer(question) {
        if (question.type === "single")
          return choiceText(question, question.answer);
        if (question.type === "true_false")
          return question.answer ? "صواب" : "خطأ";
        if (question.type === "multiple")
          return asArray(question.answer)
            .map(id => choiceText(question, id))
            .join("، ");
        if (question.type === "short_answer")
          return asArray(question.acceptedAnswers || question.answer).join(
            "، ",
          );
        if (question.type === "numeric") {
          const tolerance = Number(question.tolerance || 0);
          const unit = question.unit ? ` ${question.unit}` : "";
          return tolerance
            ? `${question.answer}${unit} ± ${tolerance}`
            : `${question.answer}${unit}`;
        }
        if (question.type === "fill_blank") {
          return (question.blanks || [])
            .map(
              blank =>
                `${blank.label || blank.id}: ${asArray(blank.acceptedAnswers || blank.answer).join(" / ")}`,
            )
            .join("\n");
        }
        if (question.type === "matching") {
          return (question.pairs || [])
            .map(pair => `${pair.left}: ${pair.right}`)
            .join("\n");
        }
        if (question.type === "ordering") {
          const itemMap = new Map(
            (question.items || []).map(item => [String(item.id), item.text]),
          );
          return asArray(question.correctOrder || question.answer)
            .map(
              (id, index) => `${index + 1}. ${itemMap.get(String(id)) || id}`,
            )
            .join("\n");
        }
        return "يحتاج مراجعة يدوية";
      }

      function choiceText(question, id) {
        const choice = (question.choices || question._choices || []).find(
          item => String(item.id) === String(id),
        );
        return choice ? choice.text : "";
      }

      function typeLabel(type) {
        const labels = {
          single: "اختيار واحد",
          multiple: "اختيار من متعدد",
          true_false: "صح أو خطأ",
          short_answer: "إجابة قصيرة",
          numeric: "رقمي",
          fill_blank: "إكمال فراغ",
          matching: "مطابقة",
          ordering: "ترتيب",
          essay: "مقالي",
        };
        return labels[type] || type || "غير محدد";
      }

      function statusLabel(status) {
        const labels = {
          correct: "صحيح",
          partial: "جزئي",
          incorrect: "خطأ",
          unanswered: "غير مجاب",
          ungraded: "مراجعة يدوية",
        };
        return labels[status] || status;
      }

      function showView(name) {
        els.setupView.hidden = name !== "setup";
        els.quizView.hidden = name !== "quiz";
        els.resultView.hidden = name !== "result";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function metricNode(label, value) {
        const node = document.createElement("div");
        node.className = "metric";
        const valueNode = document.createElement("span");
        valueNode.className = "value";
        valueNode.textContent = value;
        const labelNode = document.createElement("span");
        labelNode.className = "label";
        labelNode.textContent = label;
        node.append(valueNode, labelNode);
        return node;
      }

      const LATEX_COMMAND_RE =
        /\\(?:frac|sqrt|lambda|pi|sigma|times|gamma|alpha|beta|theta|mu|Delta|delta|omega|Omega|cdot|centerdot|pm|leq?|geq?|neq|approx|sin|cos|tan|log|ln|sum|int|lim|left|right|langle|rangle|ket|operatorname|thinsp|below|rightarrow|to|infty|vec|bar|hat|overline|underline)(?![A-Za-z])/;
      const LATEX_FRAGMENT_RE =
        /[A-Za-z0-9_{}^+\-*/=().,|<>\s]*\\(?:frac|sqrt|lambda|pi|sigma|times|gamma|alpha|beta|theta|mu|Delta|delta|omega|Omega|cdot|centerdot|pm|leq?|geq?|neq|approx|sin|cos|tan|log|ln|sum|int|lim|left|right|langle|rangle|ket|operatorname|thinsp|below|rightarrow|to|infty|vec|bar|hat|overline|underline)(?![A-Za-z])[A-Za-z0-9_{}^+\-*/=().,|<>\s\\]*/g;
      const NUCLEAR_FRAGMENT_RE =
        /\(\s*\{_[^{}\n]+?\^[^{}\n]+?\}\s*\\?[A-Za-z]+\s*\)|\{_[^{}\n]+?\^[^{}\n]+?\}\s*\\?[A-Za-z]+/g;
      const NUCLEAR_STANDALONE_RE =
        /\(\s*\{_[^{}\n]+?\^[^{}\n]+?\}\s*\\?[A-Za-z]+\s*\)|\{_[^{}\n]+?\^[^{}\n]+?\}\s*\\?[A-Za-z]+/;
      const SCIENTIFIC_NOTATION_RE =
        /\b(?:[A-Za-z](?:_[A-Za-z0-9]+)?\s*=\s*)?\d+(?:\.\d+)?\s*[xX]\s*\{?10\}?\^\{?-?\d+\}?\s*[A-Za-z/]*\b/g;
      const SCIENTIFIC_NOTATION_STANDALONE_RE =
        /\b(?:[A-Za-z](?:_[A-Za-z0-9]+)?\s*=\s*)?\d+(?:\.\d+)?\s*[xX]\s*\{?10\}?\^\{?-?\d+\}?\s*[A-Za-z/]*\b/;
      const EXISTING_MATH_RE = /(?:\$[^$]+\$|\\\(|\\\[)/;
      const ARABIC_RE = /[\u0600-\u06ff]/;
      const MATH_ONLY_RE = /^[A-Za-z0-9_{}^+\-*/=().,|<>\s\\]+$/;

      function setAutoText(node, value) {
        node.dir = "auto";
        node.textContent = autoDelimitMath(value);
        return node;
      }

      function autoDelimitMath(value) {
        const text = normalizeLatexText(value);
        if (!text || EXISTING_MATH_RE.test(text)) return text;
        return text.split("\n").map(delimitMathLine).join("\n");
      }

      function normalizeLatexText(value) {
        return String(value ?? "")
          .replace(
            /\\left\\langle([^\\$\n]*?)\\ket\b/g,
            "\\left\\langle$1\\right\\rangle",
          )
          .replace(/\\langle([^\\$\n]*?)\\ket\b/g, "\\langle$1\\rangle")
          .replace(/\\ket\b/g, "\\rangle")
          .replace(/\\centerdot\b/g, "\\cdot")
          .replace(/\\thinsp\b/g, "\\,")
          .replace(/\\lim\\below\{([^{}\n]+)\}/g, "\\lim_{$1}")
          .replace(/\\\s+/g, " ");
      }

      function delimitMathLine(line) {
        const leading = line.match(/^\s*/)?.[0] || "";
        const trailing = line.match(/\s*$/)?.[0] || "";
        const body = line.slice(leading.length, line.length - trailing.length);
        if (!body) return line;

        if (isStandaloneMath(body)) return `${leading}$${body}$${trailing}`;

        let rendered = line;
        rendered = wrapMathFragments(rendered, LATEX_FRAGMENT_RE);
        rendered = wrapMathFragments(rendered, NUCLEAR_FRAGMENT_RE);
        rendered = wrapMathFragments(rendered, SCIENTIFIC_NOTATION_RE);
        return rendered;
      }

      function isStandaloneMath(text) {
        if (ARABIC_RE.test(text) || !MATH_ONLY_RE.test(text)) return false;
        if (/^_+$/.test(text.replace(/\s/g, ""))) return false;
        return (
          LATEX_COMMAND_RE.test(text) ||
          NUCLEAR_STANDALONE_RE.test(text) ||
          SCIENTIFIC_NOTATION_STANDALONE_RE.test(text) ||
          /[=^_]|[+\-*/]/.test(text)
        );
      }

      function wrapMathFragments(text, pattern) {
        return text
          .split(/(\$[^$]*\$)/g)
          .map(part =>
            part.startsWith("$") && part.endsWith("$")
              ? part
              : part.replace(pattern, wrapInlineMath),
          )
          .join("");
      }

      function wrapInlineMath(match) {
        const leading = match.match(/^\s*/)?.[0] || "";
        const trailing = match.match(/\s*$/)?.[0] || "";
        const body = match.slice(
          leading.length,
          match.length - trailing.length,
        );
        return body ? `${leading}$${body}$${trailing}` : match;
      }

      function normalizeText(value) {
        return String(value ?? "")
          .replace(/[٠-٩]/g, digit => "٠١٢٣٤٥٦٧٨٩".indexOf(digit))
          .replace(/[۰-۹]/g, digit => "۰۱۲۳۴۵۶۷۸۹".indexOf(digit))
          .trim()
          .replace(/\s+/g, " ")
          .toLocaleLowerCase("ar");
      }

      function parseNumber(value) {
        const normalized = normalizeText(value)
          .replace(",", ".")
          .replace(/[^\d.+\-eE]/g, "");
        if (!normalized || ["+", "-", "."].includes(normalized))
          return Number.NaN;
        return Number(normalized);
      }

      function formatDuration(totalSeconds) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = Math.max(0, totalSeconds % 60);
        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      function formatDate(date) {
        return new Intl.DateTimeFormat("ar-SA", {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(new Date(date));
      }

      function clampNumber(value, min, max) {
        const number = Number(value);
        if (!Number.isFinite(number)) return min;
        return Math.min(max, Math.max(min, Math.round(number)));
      }

      function asArray(value) {
        if (Array.isArray(value)) return value;
        if (value === undefined || value === null || value === "") return [];
        return [value];
      }

      function shuffle(items) {
        const original = [...items];
        if (original.length <= 1) return original;

        for (let attempt = 0; attempt < 8; attempt += 1) {
          const copy = [...original];
          for (let index = copy.length - 1; index > 0; index -= 1) {
            const randomIndex = randomInt(index + 1);
            [copy[index], copy[randomIndex]] = [
              copy[randomIndex],
              copy[index],
            ];
          }
          if (!sameOrder(copy, original)) return copy;
        }

        return [...original.slice(1), original[0]];
      }

      function randomInt(maxExclusive) {
        if (maxExclusive <= 1) return 0;
        if (window.crypto?.getRandomValues) {
          const values = new Uint32Array(1);
          window.crypto.getRandomValues(values);
          return values[0] % maxExclusive;
        }
        return Math.floor(Math.random() * maxExclusive);
      }

      function sameOrder(items, original) {
        return items.every((item, index) => Object.is(item, original[index]));
      }

      function deepClone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function roundScore(value) {
        return Math.round((Number(value) + Number.EPSILON) * 100) / 100;
      }

      function typesetMath(root, attempts = 0) {
        if (window.MathJax?.typesetPromise) {
          return window.MathJax.typesetPromise([root]).catch(() => {});
        }
        if (window.MathJax?.startup?.promise) {
          return window.MathJax.startup.promise
            .then(() => window.MathJax.typesetPromise?.([root]))
            .catch(() => {});
        }
        if (attempts < 30) {
          return new Promise(resolve => {
            window.setTimeout(
              () => resolve(typesetMath(root, attempts + 1)),
              100,
            );
          });
        }
        return Promise.resolve();
      }

      init();
    </script>
