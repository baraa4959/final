<!doctype html>
<html lang="ar" dir="rtl" data-theme="auto">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>اختبار إلكتروني</title>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [
            ["\\(", "\\)"],
            ["$", "$"],
          ],
          displayMath: [
            ["\\[", "\\]"],
            ["$$", "$$"],
          ],
        },
        options: {
          skipHtmlTags: [
            "script",
            "noscript",
            "style",
            "textarea",
            "pre",
            "code",
          ],
        },
      };
    </script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
    ></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --surface: #ffffff;
        --surface-soft: #eef3f2;
        --text: #111827;
        --muted: #617080;
        --border: #d8dee6;
        --accent: #117865;
        --accent-strong: #0b5c4d;
        --accent-soft: #dff3ef;
        --danger: #b42318;
        --danger-soft: #fee4e2;
        --warning: #b54708;
        --warning-soft: #fff1d6;
        --info: #175cd3;
        --info-soft: #e0edff;
        --shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #101214;
        --surface: #171a1d;
        --surface-soft: #20262a;
        --text: #eef2f6;
        --muted: #a7b0ba;
        --border: #343a40;
        --accent: #5bd6bd;
        --accent-strong: #81ead4;
        --accent-soft: #163d36;
        --danger: #ff9188;
        --danger-soft: #3d1d1b;
        --warning: #ffca73;
        --warning-soft: #3d2d16;
        --info: #8cb7ff;
        --info-soft: #1a2d4f;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      }

      @media (prefers-color-scheme: dark) {
        :root[data-theme="auto"] {
          color-scheme: dark;
          --bg: #101214;
          --surface: #171a1d;
          --surface-soft: #20262a;
          --text: #eef2f6;
          --muted: #a7b0ba;
          --border: #343a40;
          --accent: #5bd6bd;
          --accent-strong: #81ead4;
          --accent-soft: #163d36;
          --danger: #ff9188;
          --danger-soft: #3d1d1b;
          --warning: #ffca73;
          --warning-soft: #3d2d16;
          --info: #8cb7ff;
          --info-soft: #1a2d4f;
          --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(180deg, rgba(17, 120, 101, 0.08), transparent 260px),
          var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .app {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 42px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--accent);
        font-size: 0.9rem;
        font-weight: 750;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 0;
        font-size: clamp(1.65rem, 4vw, 2.5rem);
        line-height: 1.15;
      }

      h2 {
        font-size: 1.08rem;
        margin-bottom: 14px;
      }

      h3 {
        font-size: 1rem;
        line-height: 1.55;
        margin-bottom: 10px;
      }

      .subtitle {
        color: var(--muted);
        margin: 8px 0 0;
        max-width: 70ch;
        line-height: 1.7;
      }

      .theme-control {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 0.85rem;
        white-space: nowrap;
      }

      .theme-select {
        min-height: 34px;
        min-width: 96px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        padding: 6px 8px;
        outline: none;
      }

      .select,
      .input,
      .textarea {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        padding: 10px 12px;
        outline: none;
      }

      .textarea {
        min-height: 104px;
        resize: vertical;
        line-height: 1.7;
      }

      .select:focus,
      .input:focus,
      .textarea:focus,
      .theme-select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 24%, transparent);
      }

      .button {
        min-height: 44px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        background: var(--surface);
        color: var(--text);
        font-weight: 750;
      }

      .button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
      }

      :root[data-theme="dark"] .button.primary {
        color: #10201c;
      }

      @media (prefers-color-scheme: dark) {
        :root[data-theme="auto"] .button.primary {
          color: #10201c;
        }
      }

      .button.danger {
        border-color: color-mix(in srgb, var(--danger) 42%, var(--border));
        color: var(--danger);
      }

      .button.small {
        min-height: 36px;
        padding: 7px 10px;
        font-size: 0.88rem;
      }

      .button.active,
      .preset.active {
        border-color: var(--accent);
        background: var(--accent-soft);
        color: var(--accent-strong);
      }

      .view[hidden],
      [hidden] {
        display: none !important;
      }

      .section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .setup-grid {
        display: grid;
        gap: 16px;
      }

      .controls-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 14px;
      }

      .field {
        display: grid;
        gap: 7px;
        min-width: 0;
      }

      .field label,
      .check span,
      .field-title {
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .preset-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .preset {
        min-height: 38px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 11px;
        background: var(--surface);
        color: var(--text);
        font-weight: 750;
      }

      .custom-panel {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-soft);
        padding: 12px;
        margin-top: 12px;
      }

      .checks {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin: 14px 0;
      }

      .check {
        min-height: 46px;
        display: flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--surface-soft);
      }

      .check input {
        width: 18px;
        height: 18px;
        accent-color: var(--accent);
      }

      .action-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 14px;
      }

      .load-status {
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.6;
        margin: 10px 0 0;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        background: var(--surface-soft);
        min-height: 76px;
      }

      .metric .value {
        display: block;
        font-size: 1.35rem;
        font-weight: 850;
        line-height: 1.1;
        margin-bottom: 4px;
      }

      .metric .label {
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.5;
      }

      .history {
        margin-top: 16px;
      }

      .history-list {
        display: grid;
        gap: 0;
      }

      .history-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 14px 0;
        border-top: 1px solid var(--border);
      }

      .history-item:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .history-title {
        font-weight: 850;
        margin-bottom: 4px;
      }

      .history-meta {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.6;
      }

      .history-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .notice {
        border: 1px solid color-mix(in srgb, var(--warning) 45%, var(--border));
        border-radius: 8px;
        background: var(--warning-soft);
        color: var(--text);
        padding: 12px 14px;
        line-height: 1.7;
        margin-bottom: 16px;
      }

      .notice-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .quiz-shell {
        display: grid;
        gap: 14px;
      }

      .quiz-status {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
      }

      .progress-wrap {
        display: grid;
        gap: 8px;
      }

      .progress-meta {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.93rem;
        font-weight: 750;
      }

      progress {
        width: 100%;
        height: 10px;
        border: 0;
        border-radius: 999px;
        overflow: hidden;
        background: var(--surface-soft);
      }

      progress::-webkit-progress-bar {
        background: var(--surface-soft);
      }

      progress::-webkit-progress-value {
        background: var(--accent);
      }

      progress::-moz-progress-bar {
        background: var(--accent);
      }

      .timer {
        min-width: 126px;
        text-align: center;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--surface);
        font-weight: 900;
        direction: ltr;
      }

      .timer.low {
        color: var(--danger);
        background: var(--danger-soft);
        border-color: color-mix(in srgb, var(--danger) 42%, var(--border));
      }

      .question-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: var(--shadow);
        padding: 20px;
      }

      .passage {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-soft);
        padding: 14px;
        margin-bottom: 16px;
      }

      .passage h2 {
        margin-bottom: 8px;
      }

      .passage-content,
      .question-prompt,
      .review-text {
        white-space: pre-line;
        line-height: 1.85;
      }

      .question-prompt {
        font-size: 1.08rem;
        font-weight: 800;
        margin-bottom: 16px;
      }

      .question-content {
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .question-text {
        flex: 1;
        min-width: 0;
      }

      .question-image-button {
        width: 76px;
        height: 76px;
        flex: 0 0 76px;
        display: grid;
        place-items: center;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-soft);
        padding: 4px;
        overflow: hidden;
      }

      .question-image-button:hover,
      .question-image-button:focus-visible {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
        outline: none;
      }

      .question-image-thumb {
        width: 100%;
        height: 100%;
        display: block;
        border-radius: 6px;
        object-fit: cover;
      }

      .answer-area {
        display: grid;
        gap: 10px;
      }

      .option {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        background: var(--surface);
        min-height: 50px;
      }

      .option:hover,
      .option:has(input:checked) {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .option.locked {
        cursor: default;
      }

      .option input {
        margin-top: 4px;
        accent-color: var(--accent);
      }

      .answer-text {
        line-height: 1.7;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .matching-row,
      .blank-row,
      .order-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(190px, 0.9fr);
        gap: 10px;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        background: var(--surface);
      }

      .order-row {
        grid-template-columns: auto minmax(0, 1fr) auto;
      }

      .order-index {
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: var(--surface-soft);
        color: var(--muted);
        font-weight: 850;
      }

      .order-actions {
        display: flex;
        gap: 6px;
      }

      .icon-button {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-soft);
        color: var(--text);
        font-weight: 900;
      }

      .answer-feedback {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        margin-top: 14px;
        line-height: 1.7;
        background: var(--surface-soft);
        font-weight: 750;
      }

      .answer-feedback.correct {
        border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
        background: var(--accent-soft);
        color: var(--accent-strong);
      }

      .answer-feedback.incorrect,
      .answer-feedback.unanswered {
        border-color: color-mix(in srgb, var(--danger) 45%, var(--border));
        background: var(--danger-soft);
        color: var(--danger);
      }

      .answer-feedback.partial {
        border-color: color-mix(in srgb, var(--warning) 45%, var(--border));
        background: var(--warning-soft);
        color: var(--warning);
      }

      .answer-feedback.ungraded {
        border-color: color-mix(in srgb, var(--info) 45%, var(--border));
        background: var(--info-soft);
        color: var(--info);
      }

      .nav-row {
        display: grid;
        grid-template-columns: auto auto minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
      }

      .question-dots {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        padding: 8px 0;
      }

      .dot {
        width: 38px;
        height: 38px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        font-weight: 800;
      }

      .dot.current {
        border-color: var(--accent);
        box-shadow: inset 0 0 0 2px var(--accent);
      }

      .dot.answered {
        background: var(--accent-soft);
        border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
      }

      .dot.locked {
        color: var(--accent-strong);
        font-weight: 950;
      }

      .result-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: start;
        margin-bottom: 16px;
      }

      .score {
        font-size: clamp(2.4rem, 8vw, 4.8rem);
        line-height: 1;
        margin: 0;
        font-weight: 950;
        color: var(--accent);
        direction: ltr;
        text-align: left;
      }

      .result-actions,
      .review-toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
        align-items: center;
      }

      .review-toolbar {
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .filter-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .review-list {
        display: grid;
        gap: 12px;
      }

      .review-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px;
        background: var(--surface);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.82rem;
        font-weight: 850;
        background: var(--surface-soft);
        color: var(--muted);
        margin: 0 0 10px 6px;
      }

      .badge.correct {
        color: var(--accent-strong);
        background: var(--accent-soft);
      }

      .badge.incorrect,
      .badge.unanswered {
        color: var(--danger);
        background: var(--danger-soft);
      }

      .badge.partial {
        color: var(--warning);
        background: var(--warning-soft);
      }

      .badge.ungraded {
        color: var(--info);
        background: var(--info-soft);
      }

      .review-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 10px;
      }

      .review-box {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        background: var(--surface-soft);
        min-width: 0;
      }

      .review-label {
        display: block;
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 800;
        margin-bottom: 5px;
      }

      .choice-review {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .choice-review-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        background: var(--surface-soft);
      }

      .choice-review-item.selected {
        border-color: color-mix(in srgb, var(--info) 45%, var(--border));
        background: var(--info-soft);
      }

      .choice-review-item.correct {
        border-color: color-mix(in srgb, var(--accent) 45%, var(--border));
        background: var(--accent-soft);
      }

      .choice-review-item.wrong-selected {
        border-color: color-mix(in srgb, var(--danger) 45%, var(--border));
        background: var(--danger-soft);
      }

      .choice-mark {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 850;
        white-space: nowrap;
      }

      .image-viewer {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(15, 23, 42, 0.78);
      }

      .image-viewer[hidden] {
        display: none !important;
      }

      .image-viewer img {
        max-width: min(94vw, 1120px);
        max-height: 86vh;
        display: block;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
        object-fit: contain;
      }

      .image-viewer-close {
        position: fixed;
        inset-block-start: 16px;
        inset-inline-end: 16px;
        min-width: 44px;
        min-height: 44px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        color: #111827;
        font-weight: 850;
      }

      .empty {
        color: var(--muted);
        line-height: 1.7;
        margin: 0;
      }

      #print-area {
        height: auto;
        inset-block-start: 0;
        inset-inline-start: -10000px;
        overflow: visible;
        pointer-events: none;
        position: fixed;
        visibility: hidden;
        width: 800px;
      }

      @media (max-width: 820px) {
        .app {
          width: min(100% - 24px, 980px);
          padding-top: 16px;
        }

        .topbar,
        .quiz-status,
        .result-head,
        .review-toolbar {
          grid-template-columns: 1fr;
          display: grid;
        }

        .theme-control,
        .result-actions,
        .action-row {
          justify-content: stretch;
        }

        .theme-select,
        .result-actions > *,
        .action-row > *,
        .review-toolbar > * {
          width: 100%;
        }

        .controls-grid,
        .checks,
        .stats-grid,
        .review-grid {
          grid-template-columns: 1fr;
        }

        .matching-row,
        .blank-row {
          grid-template-columns: 1fr;
        }

        .nav-row {
          grid-template-columns: 1fr 1fr;
        }

        .nav-row .spacer {
          display: none;
        }

        .timer {
          width: 100%;
        }

        .question-image-button {
          width: 64px;
          height: 64px;
          flex-basis: 64px;
        }
      }

      @media print {
        body {
          background: #ffffff;
          color: #111827;
        }

        .app {

    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">

          <div class="checks">
